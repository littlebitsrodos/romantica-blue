# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # Refresh availability from Airbnb + Booking.com every 2 hours.
    # Cron runs in UTC; :15 to dodge the top-of-hour runner burst.
    - cron: "15 */2 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so build_locales.py can read the last commit date
          # touching index.html / translations.js for sitemap <lastmod>.
          fetch-depth: 0
      - name: Setup Node (for build_locales.py → translations.js bridge)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Rebuild per-locale HTMLs from translations.js
        run: python3 scripts/build_locales.py
      - name: Sync availability from Airbnb + Booking.com iCal feeds
        run: python3 scripts/sync_bookings.py
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
